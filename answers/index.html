<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>DOM操作の実践テンプレート</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 id="main-title">ようこそ、関大統一祭へ！</h1>

  <button class="btn">ステージスケジュール</button>
  <button class="btn">模擬店マップ</button>
  <script>
  // ====== ここから下にJavaScriptを書いていく ======

  const title = document.querySelector('#main-title');

// class=”btn”を全て取得
const buttons = document.querySelectorAll('.btn');



// テキストの中身を変える
title.textContent = "こんにちは、JavaScript！";

//CSS（見た目を変える）
title.style.color = "red";

//クラスを追加する
title.classList.add("active");

const btn = document.querySelector('.btn');

// click イベントを監視する
btn.addEventListener('click', function(){
alert("ボタンが押されました！");
});


  
  </script>
</body>
</html>
