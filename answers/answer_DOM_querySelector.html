<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>DOM操作の実践テンプレート</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 id="main-title">ようこそ、関大統一祭へ！</h1>

  <button class="btn">ステージスケジュール</button>
 
<script>
const btn = document.querySelector('.btn');

// テキストの中身を変える
btn.addEventListener('click', function(){alert('ボタンが押されました！');});

</script>
</body>
</html>
